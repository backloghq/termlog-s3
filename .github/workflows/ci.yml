name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 25]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-10-15T17-29-55Z server /data --console-address ":9001"
          for i in {1..30}; do
            if curl -fs http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO ready"
              break
            fi
            sleep 1
          done

      - name: Create test bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
        run: aws --endpoint-url http://localhost:9000 s3 mb s3://termlog-test

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Integration tests (MinIO)
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
          S3_INTEGRATION: "1"
          S3_INTEGRATION_SLOW: "1"
          S3_TEST_BUCKET: termlog-test
          S3_TEST_ENDPOINT: http://localhost:9000
          S3_TEST_REGION: us-east-1
        run: npm run test:integration

      - name: MinIO logs (on failure)
        if: failure()
        run: docker logs minio
